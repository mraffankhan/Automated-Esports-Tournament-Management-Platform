version: "3.8"

services:
  argon-bot:
    build:
      context: .
    ports:
      - "8888:8888"
      - "6000:6000"
    restart: always

    environment:
      - PYTHONUNBUFFERED=1 # Ensure Python output is not buffered

    volumes:
      - ./logs:/app/logs # Mount a volume for logs

  argon-private-bot:
    build:
      context: .
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
    entrypoint: ["python", "src/private_bot.py"]
